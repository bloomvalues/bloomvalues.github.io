<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support · BloomValues</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --coral:   #FF6B35;
    --teal:    #3DBDB5;
    --yellow:  #FFD93D;
    --green:   #4CAF7D;
    --cream:   #FFF8F0;
    --ink:     #1A1226;
    --muted:   #9A8E7E;
    --border:  #F0EDE8;
    --soft:    #FFF0EB;
  }

  html { height: 100%; }

  body {
    min-height: 100%;
    background: var(--cream);
    font-family: 'Nunito', sans-serif;
    color: var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  /* Subtle warm radial glow behind card */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 10%, rgba(255,107,53,.08) 0%, transparent 70%),
      radial-gradient(ellipse 50% 40% at 80% 90%, rgba(61,189,181,.07) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .card {
    position: relative;
    z-index: 1;
    background: white;
    border-radius: 28px;
    padding: 44px 40px 40px;
    max-width: 420px;
    width: 100%;
    border: 1.5px solid var(--border);
    box-shadow: 0 8px 40px rgba(26,18,38,.06), 0 2px 8px rgba(26,18,38,.04);
    animation: rise .55s cubic-bezier(.34,1.56,.64,1) both;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(18px) scale(.97); }
    to   { opacity: 1; transform: translateY(0)    scale(1); }
  }

  /* Leaf sprout icon */
  .icon-wrap {
    width: 56px;
    height: 56px;
    background: var(--soft);
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
    font-size: 28px;
    animation: rise .55s cubic-bezier(.34,1.56,.64,1) .08s both;
  }

  h1 {
    font-family: 'Fredoka One', cursive;
    font-size: 30px;
    color: var(--ink);
    letter-spacing: .3px;
    margin-bottom: 4px;
    animation: rise .55s cubic-bezier(.34,1.56,.64,1) .14s both;
  }

  .tagline {
    font-size: 13px;
    color: var(--muted);
    font-weight: 600;
    margin-bottom: 28px;
    animation: rise .55s cubic-bezier(.34,1.56,.64,1) .18s both;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin-bottom: 28px;
    animation: rise .55s cubic-bezier(.34,1.56,.64,1) .22s both;
  }

  .section-label {
    font-size: 10px;
    font-weight: 800;
    color: var(--muted);
    letter-spacing: 1.4px;
    text-transform: uppercase;
    margin-bottom: 10px;
    animation: rise .55s cubic-bezier(.34,1.56,.64,1) .26s both;
  }

  .contact-row {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--soft);
    border-radius: 14px;
    padding: 14px 16px;
    text-decoration: none;
    color: inherit;
    border: 1px solid rgba(255,107,53,.15);
    transition: background .18s, transform .18s, box-shadow .18s;
    animation: rise .55s cubic-bezier(.34,1.56,.64,1) .30s both;
  }

  .contact-row:hover {
    background: #FFE8DE;
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(255,107,53,.15);
  }

  .contact-icon {
    width: 36px;
    height: 36px;
    background: var(--coral);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .contact-icon svg { width: 17px; height: 17px; }

  .contact-text { flex: 1; }
  .contact-text strong { display: block; font-size: 13px; font-weight: 800; color: var(--ink); }
  .contact-text span   { display: block; font-size: 12px; color: var(--muted); margin-top: 1px; }

  .arrow { color: var(--muted); font-size: 14px; }

  .note {
    margin-top: 20px;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.7;
    text-align: center;
    animation: rise .55s cubic-bezier(.34,1.56,.64,1) .36s both;
  }

  /* Value dots row */
  .values-row {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 28px;
    animation: rise .55s cubic-bezier(.34,1.56,.64,1) .40s both;
  }

  .val-pill {
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid;
  }

  .v1 { color: #CC4E1A; background: #FFF0EB; border-color: rgba(255,107,53,.25); }
  .v2 { color: #2A8A83; background: #E8F8F7; border-color: rgba(61,189,181,.25); }
  .v3 { color: #B8991E; background: #FFFBE8; border-color: rgba(255,217,61,.3);  }
  .v4 { color: #2E7D52; background: #EDFAF3; border-color: rgba(76,175,125,.25); }
  .v5 { color: #6A5A9E; background: #F0EEFF; border-color: rgba(155,142,196,.3); }
  .v6 { color: #C45080; background: #FFF0F8; border-color: rgba(255,126,179,.25);}
</style>
</head>
<body>

<div class="card">

  <div class="icon-wrap">🌱</div>

  <h1>BloomValues</h1>
  <p class="tagline">Teaching kids what the world forgets.</p>

  <div class="divider"></div>

  <p class="section-label">Support</p>

  <a class="contact-row" href="mailto:bloomvalues@gmail.com">
    <div class="contact-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="4" width="20" height="16" rx="3"/>
        <path d="M2 7l10 7 10-7"/>
      </svg>
    </div>
    <div class="contact-text">
      <strong>bloomvalues@gmail.com</strong>
      <span>We reply within 24 hours</span>
    </div>
    <span class="arrow">›</span>
  </a>

  <p class="note">
    For questions about your subscription, stories,<br>
    or your child's account — we're happy to help.
  </p>

  <div class="values-row">
    <span class="val-pill v1">⚡ Courage</span>
    <span class="val-pill v2">🌿 Kindness</span>
    <span class="val-pill v3">🔮 Honesty</span>
    <span class="val-pill v4">🌱 Perseverance</span>
    <span class="val-pill v5">💜 Empathy</span>
    <span class="val-pill v6">🌸 Gratitude</span>
  </div>

</div>

</body>
</html>
